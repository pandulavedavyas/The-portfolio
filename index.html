<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Hub</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        background: #050505;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .hub-container {
        text-align: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 3rem;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 243, 255, 0.2);
        box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
      }
      h1 {
        margin-bottom: 2rem;
        font-size: 2.5rem;
        background: linear-gradient(90deg, #00f3ff, #ff003c);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .links {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
      }
      .btn {
        padding: 1rem 2rem;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .btn-jarvis {
        background: #00f3ff;
        color: #050505;
      }
      .btn-portfolio {
        background: #ff003c;
        color: white;
      }
      .btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="hub-container">
      <h1>CHOOSE YOUR INTERFACE</h1>
      <div class="links">
        <a href="jarvis.html" class="btn btn-jarvis">J.A.R.V.I.S. UI</a>
        <a href="portfolio.html" class="btn btn-portfolio">FUTURISTIC UI</a>
      </div>
    </div>
    <div id="root" style="display: none;"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
